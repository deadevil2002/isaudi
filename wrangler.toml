name = "isaudi"
main = ".open-next/worker.js"
compatibility_date = "2026-02-15"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "isaudi.ai/*", zone_name = "isaudi.ai" },
  { pattern = "www.isaudi.ai/*", zone_name = "isaudi.ai" }
]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "isaudi-db"
migrations_dir = "migrations"

[vars]
APP_URL = "https://isaudi.ai"
BASE_URL = "https://isaudi.ai"
NEXT_PUBLIC_APP_URL = "https://isaudi.ai"
RESEND_FROM = "iSaudi <no-reply@updates.isaudi.ai>"

[triggers]
crons = ["0 3 * * 1", "0 4 * * 1"]
